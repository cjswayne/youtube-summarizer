name: Daily Video Summarizer

on:
  schedule:
    - cron: '0 15 * * *'  # 7am PST (8am PDT during summer)
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write          # Required to push processed_videos.json back

jobs:
  summarize:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add processed_videos.json
          git diff --staged --quiet || git commit -m "chore: update processed videos state [skip ci]"
          git push
